<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>前踢分腿角度與自動截圖</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 50vh; 
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .output_canvas {
            z-index: 10;
        }
        .info-panel {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            background: #2c3e50;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active {
            background-color: #2980b9;
            transform: translateY(2px);
        }
        .angle-display {
            font-size: 20px;
            margin: 5px 0;
        }
        .status-display {
            font-size: 18px;
            color: #2ecc71;
            font-weight: bold;
            height: 24px;
        }
        .result-panel {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
        }
        #screenshotImg {
            max-width: 90%;
            max-height: 30vh;
            border: 3px solid #f1c40f;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }
        .max-angle-text {
            font-size: 24px;
            color: #f1c40f;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="videoElement" playsinline style="display:none;"></video>
        <canvas class="output_canvas"></canvas>
        <canvas id="buffer_canvas" style="display:none;"></canvas>
    </div>

    <div class="info-panel">
        <div class="controls">
            <button id="startBtn">1. 啟動鏡頭</button>
            <button id="switchBtn">2. 切換 (目前: 後鏡頭)</button>
        </div>
        <div class="angle-display">目前角度: <span id="currentAngle">0</span>°</div>
        <div class="status-display" id="statusText">等待啟動鏡頭...</div>
    </div>

    <div class="result-panel">
        <div class="max-angle-text" id="finalAngleText">最高點角度: <span id="maxAngle">0</span>°</div>
        <img id="screenshotImg" alt="最高點截圖">
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementsByClassName('output_canvas')[0];
        const canvasCtx = canvasElement.getContext('2d');
        const bufferCanvas = document.getElementById('buffer_canvas');
        const bufferCtx = bufferCanvas.getContext('2d');

        const currentAngleEl = document.getElementById('currentAngle');
        const statusTextEl = document.getElementById('statusText');
        const maxAngleEl = document.getElementById('maxAngle');
        const screenshotImg = document.getElementById('screenshotImg');
        const finalAngleText = document.getElementById('finalAngleText');
        
        const startBtn = document.getElementById('startBtn');
        const switchBtn = document.getElementById('switchBtn');

        // 動作狀態變數
        let isKicking = false;
        let currentMaxAngle = 0;
        let useFrontCamera = false; // 預設使用後鏡頭
        let currentStream = null;
        let requestAnimFrameId = null;
        let poseLoaded = false;
        
        const START_KICK_THRESHOLD = 40; 
        const END_KICK_DROP = 15;        

        // 計算兩個向量之間的夾角
        function calculateAngle(hip1, ankle1, hip2, ankle2) {
            const dx1 = ankle1.x - hip1.x;
            const dy1 = ankle1.y - hip1.y;
            const dx2 = ankle2.x - hip2.x;
            const dy2 = ankle2.y - hip2.y;

            const dotProduct = dx1 * dx2 + dy1 * dy2;
            const mag1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
            const mag2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

            if (mag1 === 0 || mag2 === 0) return 0;
            let angleRad = Math.acos(dotProduct / (mag1 * mag2));
            return angleRad * (180 / Math.PI);
        }

        // 初始化 MediaPipe Pose 模型
        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});
        pose.setOptions({
            modelComplexity: 1, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);
        pose.initialize().then(() => {
            poseLoaded = true;
            if(statusTextEl.innerText === "等待啟動鏡頭...") {
                statusTextEl.innerText = "模型載入完成，請點擊啟動鏡頭";
            }
        });

        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            bufferCanvas.width = videoElement.videoWidth;
            bufferCanvas.height = videoElement.videoHeight;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 如果是前鏡頭，將畫面水平翻轉 (鏡像)
            if (useFrontCamera) {
                canvasCtx.translate(canvasElement.width, 0);
                canvasCtx.scale(-1, 1);
            }
            
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});

                const landmarks = results.poseLandmarks;
                const leftHip = landmarks[23];
                const rightHip = landmarks[24];
                const leftAnkle = landmarks[27];
                const rightAnkle = landmarks[28];

                if (leftHip.visibility > 0.5 && rightHip.visibility > 0.5 && 
                    leftAnkle.visibility > 0.5 && rightAnkle.visibility > 0.5) {
                    
                    let angle = Math.round(calculateAngle(leftHip, leftAnkle, rightHip, rightAnkle));
                    currentAngleEl.innerText = angle;

                    if (!isKicking && angle > START_KICK_THRESHOLD) {
                        isKicking = true;
                        currentMaxAngle = angle;
                        statusTextEl.innerText = "偵測到踢擊，記錄中...";
                        statusTextEl.style.color = "#e74c3c"; 
                        
                        bufferCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
                        bufferCtx.drawImage(canvasElement, 0, 0);

                    } else if (isKicking) {
                        if (angle > currentMaxAngle) {
                            currentMaxAngle = angle;
                            bufferCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
                            bufferCtx.drawImage(canvasElement, 0, 0);
                        } else if (angle < currentMaxAngle - END_KICK_DROP) {
                            isKicking = false;
                            statusTextEl.innerText = "踢擊完成！等待下一次動作...";
                            statusTextEl.style.color = "#2ecc71"; 
                            
                            maxAngleEl.innerText = currentMaxAngle;
                            finalAngleText.style.display = "block";
                            screenshotImg.src = bufferCanvas.toDataURL('image/jpeg', 0.8);
                            screenshotImg.style.display = "block";
                            currentMaxAngle = 0;
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        // 啟動或切換鏡頭的核心邏輯
        async function startCamera() {
            if (!poseLoaded) {
                alert("AI 模型還在載入中，請稍等幾秒鐘再試！");
                return;
            }

            // 關閉現有的鏡頭連線
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            try {
                // 請求鏡頭權限
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = currentStream;
                videoElement.play();
                statusTextEl.innerText = "等待踢擊動作...";
                startBtn.style.display = "none"; // 成功啟動後隱藏啟動按鈕
            } catch (err) {
                console.error("鏡頭錯誤: ", err);
                alert("無法存取鏡頭！請確認你已在瀏覽器設定中允許此網頁使用攝影機。");
            }
        }

        // 監聽影片播放，將畫面送給 AI 模型分析
        videoElement.addEventListener('play', () => {
            let lastVideoTime = -1;
            async function processFrame() {
                if (!videoElement.paused && !videoElement.ended) {
                    if (videoElement.currentTime !== lastVideoTime) {
                        lastVideoTime = videoElement.currentTime;
                        await pose.send({image: videoElement});
                    }
                    requestAnimFrameId = requestAnimationFrame(processFrame);
                }
            }
            processFrame();
        });

        // 按鈕事件綁定
        startBtn.addEventListener('click', startCamera);

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            switchBtn.innerText = `2. 切換 (目前: ${useFrontCamera ? '前' : '後'}鏡頭)`;
            // 如果已經啟動過鏡頭，直接重啟以套用新鏡頭
            if (currentStream) {
                startCamera();
            }
        });

    </script>
</body>
</html>
