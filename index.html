<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>前踢分腿角度與自動截圖</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 50vh; 
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .output_canvas {
            z-index: 10;
        }
        .info-panel {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            background: #2c3e50;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active {
            background-color: #2980b9;
            transform: translateY(2px);
        }
        #downloadBtn {
            background-color: #e67e22;
            display: none; /* 預設隱藏，踢完才顯示 */
        }
        #downloadBtn:active {
            background-color: #d35400;
        }
        .angle-display {
            font-size: 20px;
            margin: 5px 0;
        }
        .status-display {
            font-size: 16px;
            color: #2ecc71;
            font-weight: bold;
            height: 24px;
        }
        .result-panel {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
        }
        #screenshotImg {
            max-width: 90%;
            max-height: 25vh;
            border: 3px solid #f1c40f;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .max-angle-text {
            font-size: 24px;
            color: #f1c40f;
            font-weight: bold;
            margin-top: 5px;
            display: none;
        }
        #debugLog {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="videoElement" playsinline autoplay muted style="display:none;"></video>
        
        <canvas class="output_canvas"></canvas>
        <canvas id="buffer_canvas" style="display:none;"></canvas>
    </div>

    <div class="info-panel">
        <div class="controls">
            <button id="startBtn">1. 啟動鏡頭</button>
            <button id="switchBtn">2. 切換前後鏡</button>
        </div>
        <div class="angle-display">目前角度: <span id="currentAngle">0</span>°</div>
        <div class="status-display" id="statusText">等待啟動鏡頭...</div>
        <div id="debugLog"></div>
    </div>

    <div class="result-panel">
        <div class="max-angle-text" id="finalAngleText">最高點角度: <span id="maxAngle">0</span>°</div>
        <img id="screenshotImg" alt="最高點截圖">
        <button id="downloadBtn">⬇️ 下載截圖至手機</button>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementsByClassName('output_canvas')[0];
        const canvasCtx = canvasElement.getContext('2d');
        const bufferCanvas = document.getElementById('buffer_canvas');
        const bufferCtx = bufferCanvas.getContext('2d');

        const currentAngleEl = document.getElementById('currentAngle');
        const statusTextEl = document.getElementById('statusText');
        const maxAngleEl = document.getElementById('maxAngle');
        const screenshotImg = document.getElementById('screenshotImg');
        const finalAngleText = document.getElementById('finalAngleText');
        const debugLog = document.getElementById('debugLog');
        
        const startBtn = document.getElementById('startBtn');
        const switchBtn = document.getElementById('switchBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let isKicking = false;
        let currentMaxAngle = 0;
        let useFrontCamera = false; 
        let currentStream = null;
        let poseLoaded = false;
        let isProcessingFrame = false; // 防止運算卡死的鎖
        
        const START_KICK_THRESHOLD = 40; 
        const END_KICK_DROP = 15;        

        function calculateAngle(hip1, ankle1, hip2, ankle2) {
            const dx1 = ankle1.x - hip1.x;
            const dy1 = ankle1.y - hip1.y;
            const dx2 = ankle2.x - hip2.x;
            const dy2 = ankle2.y - hip2.y;

            const dotProduct = dx1 * dx2 + dy1 * dy2;
            const mag1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
            const mag2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

            if (mag1 === 0 || mag2 === 0) return 0;
            let angleRad = Math.acos(dotProduct / (mag1 * mag2));
            return angleRad * (180 / Math.PI);
        }

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});
        pose.setOptions({
            modelComplexity: 1, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);
        pose.initialize().then(() => {
            poseLoaded = true;
            if(statusTextEl.innerText === "等待啟動鏡頭...") {
                statusTextEl.innerText = "模型就緒，請點擊啟動";
            }
        });

        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            bufferCanvas.width = videoElement.videoWidth;
            bufferCanvas.height = videoElement.videoHeight;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (useFrontCamera) {
                canvasCtx.translate(canvasElement.width, 0);
                canvasCtx.scale(-1, 1);
            }
            
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});

                const landmarks = results.poseLandmarks;
                const leftHip = landmarks[23];
                const rightHip = landmarks[24];
                const leftAnkle = landmarks[27];
                const rightAnkle = landmarks[28];

                if (leftHip.visibility > 0.5 && rightHip.visibility > 0.5 && 
                    leftAnkle.visibility > 0.5 && rightAnkle.visibility > 0.5) {
                    
                    let angle = Math.round(calculateAngle(leftHip, leftAnkle, rightHip, rightAnkle));
                    currentAngleEl.innerText = angle;

                    if (!isKicking && angle > START_KICK_THRESHOLD) {
                        isKicking = true;
                        currentMaxAngle = angle;
                        statusTextEl.innerText = "偵測中... (踢擊進行中)";
                        statusTextEl.style.color = "#e74c3c"; 
                        downloadBtn.style.display = "none"; // 隱藏下載按鈕
                        
                        bufferCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
                        bufferCtx.drawImage(canvasElement, 0, 0);

                    } else if (isKicking) {
                        if (angle > currentMaxAngle) {
                            currentMaxAngle = angle;
                            bufferCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
                            bufferCtx.drawImage(canvasElement, 0, 0);
                        } else if (angle < currentMaxAngle - END_KICK_DROP) {
                            isKicking = false;
                            statusTextEl.innerText = "完成！可繼續下一次踢擊";
                            statusTextEl.style.color = "#2ecc71"; 
                            
                            maxAngleEl.innerText = currentMaxAngle;
                            finalAngleText.style.display = "block";
                            screenshotImg.src = bufferCanvas.toDataURL('image/jpeg', 0.9);
                            screenshotImg.style.display = "block";
                            downloadBtn.style.display = "block"; // 顯示下載按鈕
                            
                            currentMaxAngle = 0;
                        }
                    }
                }
            }
            canvasCtx.restore();
            isProcessingFrame = false; // 解除鎖定
        }

        async function startCamera() {
            if (!poseLoaded) {
                alert("AI 尚未準備好，請稍等。");
                return;
            }

            debugLog.innerText = "正在請求鏡頭權限...";
            
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = currentStream;
                
                // 確保影片播放成功
                await videoElement.play();
                
                statusTextEl.innerText = "鏡頭已啟動！請開始動作";
                debugLog.innerText = "";
                startBtn.style.display = "none"; 
                
                // 開始影像處理迴圈
                requestAnimationFrame(processFrame);
                
            } catch (err) {
                debugLog.innerText = "錯誤: " + err.message;
                alert("無法存取鏡頭！請確認您的瀏覽器設定已允許此網頁使用攝影機。");
            }
        }

        // 獨立的影像處理迴圈，避免卡死
        async function processFrame() {
            if (!videoElement.paused && !videoElement.ended && !isProcessingFrame) {
                isProcessingFrame = true;
                await pose.send({image: videoElement});
            }
            // 持續呼叫自己，形成迴圈
            requestAnimationFrame(processFrame);
        }

        startBtn.addEventListener('click', startCamera);

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            if (currentStream) {
                startCamera(); // 重新啟動以套用新鏡頭
            }
        });

        // 下載圖片按鈕邏輯
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            // 設定下載的檔名，包含當時的角度
            link.download = `kick_angle_${maxAngleEl.innerText}deg.jpg`;
            link.href = screenshotImg.src;
            link.click();
        });

    </script>
</body>
</html>
